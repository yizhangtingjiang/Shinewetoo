<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心为途 · Shinewetoo</title>
    <meta name="description" content="觉醒之人生，通过眼耳鼻舌身意，色受想行识因缘际遇，不断历练自己内心，不断进步提频升维。">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #f7f6f2;
            color: #2c2c2c;
            line-height: 1.7;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* 导航 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            z-index: 999;
            box-shadow: 0 1px 10px rgba(0,0,0,0.05);
        }

        .nav-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            font-size: 20px;
            font-weight: 500;
            color: #3d3d3d;
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            font-size: 15px;
            color: #555;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #977d5b;
        }

        /* Banner */
        .banner {
            margin-top: 70px;
            min-height: 70vh;
            background: linear-gradient(to bottom, #e9e6df, #f7f6f2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 20px;
        }

        .banner h1 {
            font-size: 36px;
            font-weight: 400;
            color: #333;
            margin-bottom: 20px;
            max-width: 800px;
            line-height: 1.5;
        }

        .banner p {
            font-size: 16px;
            color: #666;
            max-width: 700px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: #888;
            margin-top: 10px;
        }

        /* 内容区块 */
        .section {
            max-width: 1100px;
            margin: 0 auto;
            padding: 80px 20px;
        }

        .section-title {
            text-align: center;
            font-size: 24px;
            font-weight: 400;
            color: #333;
            margin-bottom: 50px;
            position: relative;
        }

        .section-title::after {
            content: '';
            width: 40px;
            height: 1px;
            background: #977d5b;
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* 产品卡片 */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        .card-img {
            height: 180px;
            background: #e9e6df;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 14px;
        }

        .card-body {
            padding: 20px;
        }

        .card-title {
            font-size: 16px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .card-desc {
            font-size: 14px;
            color: #777;
        }

        /* 理念 */
        .idea {
            background: #fff;
            padding: 60px 30px;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.03);
            text-align: center;
        }

        .idea p {
            font-size: 16px;
            color: #555;
            line-height: 2;
            margin-bottom: 15px;
        }

        /* 底部 */
        footer {
            background: #333;
            color: #aaa;
            padding: 40px 20px;
            text-align: center;
            font-size: 14px;
        }

        .footer-text {
            max-width: 800px;
            margin: 0 auto;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .nav-links {
                gap: 18px;
            }
            .banner h1 {
                font-size: 26px;
            }
            .section {
                padding: 50px 20px;
            }
        }
    </style>
</head>
